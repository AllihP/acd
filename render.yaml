services:
  # --- BACKEND ---
  - type: web
    name: acd-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn acd_backend.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false # On la remplit manuellement avec Neon
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "acd-backend.onrender.com"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin

  # --- FRONTEND ---
  - type: web
    name: acd-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://acd-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html