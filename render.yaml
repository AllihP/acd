databases:
  - name: acd-db
    databaseName: acd_db
    user: acd_user
    plan: free

services:
  - type: web
    name: acd-backend
    runtime: python
    # rootDir: backend   ← SUPPRIMER si manage.py est à la racine
    buildCommand: "./build.sh"
    startCommand: "gunicorn acd_backend.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: acd-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://acd-frontend.onrender.com"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@acd.td
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

  - type: web
    name: acd-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://acd-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html